<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Fake CNC machine preview</title>
  <desc id="desc">A stylized mock CNC machine in a dark smart factory style.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0d1a30"/>
      <stop offset="1" stop-color="#10122a"/>
    </linearGradient>
    <linearGradient id="machine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f3557"/>
      <stop offset="1" stop-color="#0d1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00c2ff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
