    <rect x="238" y="336" width="106" height="44" rx="10" fill="#10284a" stroke="#7c3aed"/>
    <rect x="364" y="336" width="106" height="44" rx="10" fill="#10284a" stroke="#22c55e"/>
    <circle cx="609" cy="168" r="16" fill="#22c55e"/>
